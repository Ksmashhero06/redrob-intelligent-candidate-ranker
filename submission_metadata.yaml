ai_usage_summary: |
  Used Google Antigravity IDE (Gemini) as a pair-programming assistant for:
  - Architecture discussion and scoring rubric design
  - Code review and debugging
  - Porting TypeScript scoring logic to Python
  No candidate data was fed to any LLM during scoring.
  The ranking itself is 100% rule-based, CPU-only, and deterministic.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  We implement a rule-based multi-factor ranker scoring candidates across 5 core dimensions: Title Fit, Skill Depth, Experience Band, Location Fit, and a 12-signal Behavioral Modifier.
  The key differentiator of our approach versus naive keyword matching is our cross-field corroboration mechanism:
  1. Title Fit is anchored on technical role titles, ensuring description matches only serve as bonuses and penalizing non-technical profiles.
  2. Skill Depth validates the timeline of claimed AI/ML/Search skills (e.g. embeddings, vector search, RAG) by checking for overlap with actual career history durations, requiring relevant domain keywords in titles/descriptions of those corresponding roles to verify authenticity.
  3. Experience Band uses a Gaussian curve peaking at 7 years, penalized for pure service/academic backgrounds.
  4. Location Fit matches prioritized engineering hubs.
  5. Behavioral Modifier acts as an engagement multiplier.
  Honeypots are structurally detected and excluded (scored 0). Runtime is ~30 seconds for 100k candidates on CPU.

